<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <meta name="author" content="Cleon Hone">
    <meta name="description"
        content="Home page for the class WDD 131, Dynamic Web Fundamentals, where it includes info on myself and links to projects.">
    <link rel="stylesheet" href="styles/place.css">
    <script src="scripts/getdates.js" defer></script>
    <script src="scripts/place.js" defer></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100..900;1,100..900&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <!-- End Google Fonts -->
</head>

<body>
    <header>
        <h1>
            Utah
        </h1>
    </header>
    <main>
        <section>
            <picture class="hero">
                <source media="(min-width: 550px)" srcset="images/utah-stars-ken-cheung-medium.webp">
                <img src="images/utah-stars-ken-cheung.webp" alt="Night">
            </picture>
            <div class="data">
                <h2>
                    Data
                </h2>
                <dl>
                    <dt>Area:</dt>
                    <dd>219,882 sq km</dd>
                    <dt>Population:</dt>
                    <dd>3.55 million</dd>
                    <dt>Capital:</dt>
                    <dd>Salt Lake City</dd>
                    <dt>Languages:</dt>
                    <dd>English</dd>
                    <dt>Currency:</dt>
                    <dd>US Dollar</dd>
                    <dt>Time Zone:</dt>
                    <dd>GMT-6</dd>
                    <dt>Calling Code:</dt>
                    <dd>+1 (801); (385); (435)</dd>
                    <dt>Internet TLD:</dt>
                    <dd>.us</dd>
                </dl>
            </div>
            <div class="weather">
                <h2>
                    Weather
                </h2>
                <!-- SVG Weather Icon Link in assignment-->
                <div class="weather-icon">
                    <img src="images/sun.svg" alt="Sun Icon">
                </div>
                <dl>
                    <dt>Temperature:</dt>
                    <dd>69 F°</dd>
                    <dt>Conditions:</dt>
                    <dd>Sunny</dd>
                    <dt>Wind:</dt>
                    <dd>5 mph</dd>
                    <dt>Wind Chill:</dt>
                    <dd id="windchill">N/A</dd>
                </dl>
            </div>
        </section>

    </main>
    <footer>
        <p>
            &copy;<span id="currentyear"></span> | Cleon Hone | Utah
        </p>
        <p id="lastModified">
        </p>
    </footer>
</body>

</html>
